# Enable timing helpers used by the benchmark
CONFIG_TIMING_FUNCTIONS=y

# Pure-C AES: no Oberon, no NRF_SECURITY, no mbedTLS AES backend needed
CONFIG_BUILD_WITH_TFM=n

# Increase stack for benchmarking (key schedule uses ~200 bytes on stack)
CONFIG_MAIN_STACK_SIZE=8192

# RTT console
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
