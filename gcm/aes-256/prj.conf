# Enable timing helpers used by the benchmark
CONFIG_TIMING_FUNCTIONS=y

# Enable mbedTLS software AES via Oberon backend (no CC3xx — CC312 is secure-only on nRF5340)
CONFIG_NRF_SECURITY=y

CONFIG_MBEDTLS_LEGACY_CRYPTO_C=y
CONFIG_MBEDTLS_AES_C=y
CONFIG_PSA_WANT_ALG_GCM=y
CONFIG_PSA_WANT_KEY_TYPE_AES=y
CONFIG_BUILD_WITH_TFM=n

# Heap for PSA volatile key storage (mbedTLS internal heap)
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=4096

# Increase stack for benchmarking
CONFIG_MAIN_STACK_SIZE=8192

# RTT console
CONFIG_USE_SEGGER_RTT=y
CONFIG_RTT_CONSOLE=y
CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=y
CONFIG_SEGGER_RTT_BUFFER_SIZE_UP=4096
